{% extends "base.html" %}
{% load static %}

{% block title %}
    Доступ запрещён - {{ block.super }}
{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center min-vh-75">
    <div class="col-lg-6 col-md-8">
        <div class="card border-0 shadow-lg text-center p-4">
            <div class="card-body">
                <div class="display-1 text-danger mb-4">
                    <i class="bi bi-shield-lock"></i> 403
                </div>
                <h1 class="display-6 fw-bold mb-3">Доступ запрещён</h1>
                <p class="text-muted fs-5 mb-4">
                    У вас недостаточно прав для просмотра этой страницы.
                </p>
                <p class="text-secondary small mb-4">
                    Если вы считаете, что это ошибка, обратитесь к администратору.
                </p>
                <a href="{% url 'blog:index_page' %}" class="btn btn-dark btn-lg px-5">
                    <i class="bi bi-house-door"></i> На главную
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
