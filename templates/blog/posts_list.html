{% extends "base.html" %}

{% block title %}Категории публикаций — {{ block.super }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <h1 class="mb-4 fw-bold text-dark">Список опубликованных статей</h1>

        <div class="list-group shadow-sm">
            {% for post in posts %}
                <a href="{% url 'blog:posts_detail' post.slug %}" class="list-group-item list-group-item-action d-flex justify-content-between align-items-center p-3 fs-5">
                    <div>
                        📁 <strong>{{ post.title }}</strong>
                    </div>
                </a>
            {% empty %}
                <div class="alert alert-info mb-0">Опубликованных статей нет.</div>
            {% endfor %}
        </div>
    </div>
</div>
{% endblock %}
